<ui-card tone="glass">
  <div class="space-y-6">
    <div class="flex flex-col gap-2 sm:flex-row sm:items-end sm:justify-between">
      <div>
        <p class="text-xs font-semibold uppercase tracking-[0.3em] text-stone-500">
          {{ isEdit() ? 'Editar ateliê' : 'Novo ateliê' }}
        </p>
        <h1 class="text-3xl font-black text-stone-950">{{ isEdit() ? 'Ajustar cadastro' : 'Cadastrar ateliê' }}</h1>
      </div>
      <a routerLink="/atelie" ui-button variant="ghost">Voltar</a>
    </div>

    @if (loadingData()) {
      <p class="text-sm text-stone-600">Carregando dados do ateliê...</p>
    }
    @if (errorMessage()) {
      <div class="rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">{{ errorMessage() }}</div>
    }
    @if (successMessage()) {
      <div class="rounded-2xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-700">{{ successMessage() }}</div>
    }

    <form class="grid gap-5 lg:grid-cols-2" [formGroup]="form" (ngSubmit)="submit()">
      <label class="block space-y-2 lg:col-span-2">
        <span class="text-sm font-medium text-stone-700">Especialidade / Era</span>
        <input formControlName="especialidadeEra" type="text" class="w-full rounded-2xl border border-stone-200 bg-white px-4 py-3 text-stone-900 outline-none transition focus:border-amber-500 focus:ring-4 focus:ring-amber-100 disabled:bg-stone-100" [readonly]="isEdit()" placeholder="Ex: Restauração Art Déco" />
        @if (fieldError('especialidadeEra')) {
          <span class="text-sm text-red-600">{{ fieldError('especialidadeEra') }}</span>
        }
      </label>

      <label class="block space-y-2">
        <span class="text-sm font-medium text-stone-700">Data de fundação</span>
        <input formControlName="dataFundacao" type="date" class="w-full rounded-2xl border border-stone-200 bg-white px-4 py-3 text-stone-900 outline-none transition focus:border-amber-500 focus:ring-4 focus:ring-amber-100 disabled:bg-stone-100" [readonly]="isEdit()" />
        @if (fieldError('dataFundacao')) {
          <span class="text-sm text-red-600">{{ fieldError('dataFundacao') }}</span>
        }
      </label>

      <label class="block space-y-2">
        <span class="text-sm font-medium text-stone-700">Área da oficina (m²)</span>
        <input formControlName="areaOficinaM2" type="number" min="50" class="w-full rounded-2xl border border-stone-200 bg-white px-4 py-3 text-stone-900 outline-none transition focus:border-amber-500 focus:ring-4 focus:ring-amber-100" />
        @if (fieldError('areaOficinaM2')) {
          <span class="text-sm text-red-600">{{ fieldError('areaOficinaM2') }}</span>
        }
      </label>

      <label class="flex items-center gap-3 rounded-2xl border border-stone-200 bg-stone-50 px-4 py-4 lg:col-span-2">
        <input formControlName="equipadoCompleto" type="checkbox" class="h-4 w-4 rounded border-stone-300 text-amber-700 focus:ring-amber-500" />
        <span>
          <span class="block font-medium text-stone-900">Equipado completamente</span>
          <span class="block text-sm text-stone-600">Marque quando o espaço estiver pronto para operação total.</span>
        </span>
      </label>

      <div class="flex flex-wrap gap-3 lg:col-span-2">
        <button type="submit" ui-button [disabled]="submitting()">Salvar</button>
        <a routerLink="/atelie" ui-button variant="ghost">Cancelar</a>
      </div>
    </form>
  </div>
</ui-card>
