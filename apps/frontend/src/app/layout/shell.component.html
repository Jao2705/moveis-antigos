<div class="min-h-screen bg-[radial-gradient(circle_at_top_left,_rgba(89,62,36,0.08),_transparent_38%),radial-gradient(circle_at_bottom_right,_rgba(147,120,92,0.08),_transparent_34%),linear-gradient(180deg,_#fcfaf7_0%,_#f3ede6_100%)] text-foreground">
  <header class="border-b border-border/80 bg-white/72 backdrop-blur-xl">
    <div class="mx-auto flex max-w-7xl flex-col gap-4 px-4 py-4 sm:px-6 lg:px-8 xl:flex-row xl:items-center xl:justify-between">
      <a routerLink="/dashboard" class="group flex items-center gap-3">
        <span class="flex h-11 w-11 items-center justify-center rounded-2xl bg-primary text-sm font-black text-primary-foreground shadow-lg shadow-primary/15">
          MA
        </span>
        <div>
          <p class="text-xs uppercase tracking-[0.35em] text-primary/70">Moveis Antigos</p>
          <p class="text-sm font-semibold text-foreground">Painel de oficina</p>
        </div>
      </a>

      <div class="flex flex-col gap-3 xl:items-end">
        <nav class="flex flex-wrap items-center justify-start gap-2 text-sm xl:justify-end">
          <a routerLink="/dashboard" routerLinkActive="bg-primary text-primary-foreground shadow-lg shadow-primary/10" class="rounded-full px-4 py-2 text-foreground/80 transition hover:bg-muted">
            Dashboard
          </a>
          <a routerLink="/atelie" routerLinkActive="bg-primary text-primary-foreground shadow-lg shadow-primary/10" class="rounded-full px-4 py-2 text-foreground/80 transition hover:bg-muted">
            Ateliês
          </a>
          @if (auth.isAdmin()) {
            <a routerLink="/admin/users" routerLinkActive="bg-primary text-primary-foreground shadow-lg shadow-primary/10" class="rounded-full px-4 py-2 text-foreground/80 transition hover:bg-muted">
              Usuários
            </a>
          }
          <button type="button" ui-button variant="ghost" class="ml-2" (click)="auth.logout()">
            Sair
          </button>
        </nav>

        @if (auth.user(); as user) {
          <div class="flex items-center gap-3 rounded-2xl border border-border bg-card/90 px-4 py-2 shadow-[0_12px_30px_-24px_rgba(68,45,15,0.35)]">
            <div class="hidden h-9 w-9 items-center justify-center rounded-full bg-primary text-sm font-bold text-primary-foreground sm:flex">
              {{ user.nome.slice(0, 1).toUpperCase() }}
            </div>
            <div class="text-right">
              <p class="text-[10px] font-semibold uppercase tracking-[0.25em] text-primary/70">Usuário autenticado</p>
              <p class="text-sm font-semibold text-foreground">{{ user.nome }}</p>
              <p class="text-xs text-muted-foreground">
                {{ user.role === 'admin' ? 'Administrador' : 'Usuário' }} · {{ user.email }}
              </p>
            </div>
          </div>
        }
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
    <router-outlet />
  </main>
</div>
